<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Portfolio Construction | Orion</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box}body{margin:0;background:#f4f7fa;color:#172033;font-family:Poppins,sans-serif}#sidebar{position:fixed;inset:0 auto 0 0;width:256px;background:#fff;border-right:1px solid #e2eaf0;overflow:auto}main{margin-left:256px;padding:28px}.eyebrow{font-size:10px;font-weight:700;letter-spacing:.14em;color:#64748b}h1{font-size:22px;margin:5px 0}.card{margin-top:18px;background:#fff;border:1px solid #e2eaf0;border-radius:13px;padding:24px;font-size:12px;color:#64748b}@media(max-width:850px){#sidebar{display:none}main{margin-left:0}}</style></head><body><aside id="sidebar"></aside><main><div class="eyebrow">ORION · BDC INTELLIGENCE</div><h1>Portfolio Construction</h1><div class="card">Portfolio construction analysis will be added here.</div></main><script>fetch('/bdc/bbdc/sidebar.html').then(r=>r.text()).then(h=>{sidebar.innerHTML=h;const open=['bbdc-nav','portfolio-nav'];localStorage.setItem('bbdc-sidebar-sections',JSON.stringify(open));document.querySelectorAll('#sidebar [data-target]').forEach(b=>{const t=document.getElementById(b.dataset.target);if(t&&open.includes(b.dataset.target)){t.classList.remove('hidden');const a=b.querySelector('.arrow');if(a)a.textContent='▼'}});document.querySelectorAll('#sidebar a').forEach(a=>{if(new URL(a.href,location.origin).pathname===location.pathname)a.classList.add('active')})})</script></body></html>
