<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Herbalife · Financials | Orion</title>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/jditomaso1/private-credit-marketing/main/img/favicon.png?v=2">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>*{box-sizing:border-box}body{margin:0;background:#f4f7fa;color:#172033;font-family:Poppins,sans-serif}#sidebar{position:fixed;inset:0 auto 0 0;width:256px;background:#fff;border-right:1px solid #e2eaf0;z-index:30;overflow:auto}main{margin-left:256px;min-height:100vh;padding:28px}.eyebrow{font-size:10px;font-weight:700;letter-spacing:.14em;color:#64748b}h1{font-size:22px;font-weight:700;margin:5px 0}.card{margin-top:18px;background:#fff;border:1px solid #e2eaf0;border-radius:13px;padding:24px;font-size:12px;color:#64748b}@media(max-width:850px){#sidebar{display:none}main{margin-left:0}}</style>
</head>
<body><aside id="sidebar"></aside><main><div class="eyebrow">ORION · BDC CREDIT INTELLIGENCE</div><h1>Herbalife · Financials</h1><div class="card">Herbalife financials analysis will be added here.</div></main>
<script>
async function loadSidebar(){try{const html=await fetch('/bdc/bbdc/sidebar.html?v=20260717-credit-placeholders',{cache:'no-store'}).then(r=>{if(!r.ok)throw Error(r.status);return r.text()});document.getElementById('sidebar').innerHTML=html;const store='bbdc-sidebar-sections',required=["bbdc-nav","credits-nav","credit-analysis-nav","herbalife-nav"];let saved=[];try{saved=JSON.parse(localStorage.getItem(store)||'[]')}catch(e){};required.forEach(id=>{if(!saved.includes(id))saved.push(id)});const apply=(id,on)=>{const section=document.getElementById(id),icon=document.getElementById('icon-'+id);if(!section)return;section.classList.toggle('hidden',!on);if(icon)icon.style.transform=on?'rotate(90deg)':'rotate(0deg)'};window.toggleSection=id=>{let open=[];try{open=JSON.parse(localStorage.getItem(store)||'[]')}catch(e){}const section=document.getElementById(id);if(!section)return;const on=section.classList.contains('hidden');open=on?[...new Set([...open,id])]:open.filter(x=>x!==id);localStorage.setItem(store,JSON.stringify(open));apply(id,on)};localStorage.setItem(store,JSON.stringify(saved));document.querySelectorAll('#sidebar [id$="-nav"]').forEach(el=>apply(el.id,saved.includes(el.id)));document.querySelectorAll('#sidebar a[href]').forEach(a=>{if(new URL(a.href,location.origin).pathname===location.pathname){a.classList.add('bg-blue-50','text-blue-700','font-semibold');a.setAttribute('aria-current','page')}})}catch(e){console.warn('Sidebar could not be loaded',e)}}
loadSidebar();
</script></body></html>
