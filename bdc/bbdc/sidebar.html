<script>
function toggleSection(id) {
  const section = document.getElementById(id);
  const icon = document.getElementById("icon-" + id);

  if (!section || !icon) return;

  section.classList.toggle("hidden");
  const isOpen = !section.classList.contains("hidden");
  icon.style.transform = isOpen ? "rotate(90deg)" : "rotate(0deg)";

  const openSections = JSON.parse(localStorage.getItem("bbdc-sidebar-sections") || "[]");
  const updatedSections = isOpen
    ? [...new Set([...openSections, id])]
    : openSections.filter(sectionId => sectionId !== id);

  localStorage.setItem("bbdc-sidebar-sections", JSON.stringify(updatedSections));
}

document.addEventListener("DOMContentLoaded", () => {
  const openSections = JSON.parse(localStorage.getItem("bbdc-sidebar-sections") || '["overview-nav"]');

  openSections.forEach(id => {
    const section = document.getElementById(id);
    const icon = document.getElementById("icon-" + id);

    if (section && icon) {
      section.classList.remove("hidden");
      icon.style.transform = "rotate(90deg)";
    }
  });
});
</script>
