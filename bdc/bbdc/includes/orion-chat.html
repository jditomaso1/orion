<!-- ASK ORION — BBDC OVERVIEW PROTOTYPE -->
<button id="bbdc-ask-orion" type="button">Ask Orion</button>
<div id="bbdc-orion-scrim"></div>
<aside id="bbdc-orion-panel" aria-hidden="true">
  <header class="oc-head">
    <div><div class="oc-eyebrow">ORION · BBDC INTELLIGENCE</div><div class="oc-title">Ask Orion</div><div id="bbdc-orion-context" class="oc-context">Barings BDC</div></div>
    <button id="bbdc-orion-close" type="button" aria-label="Close Ask Orion">×</button>
  </header>
  <div class="oc-scope"><span></span><span id="bbdc-orion-scope">Focused on BBDC and its portfolio</span></div>
  <div id="bbdc-orion-messages" class="oc-messages"></div>
  <div id="bbdc-orion-prompts" class="oc-prompts">
    <button type="button">Summarize this page.</button>
    <button type="button">What are the key metrics?</button>
    <button type="button">What should I focus on?</button>
  </div>
  <form id="bbdc-orion-form" class="oc-form">
    <textarea id="bbdc-orion-input" rows="1" placeholder="Ask about BBDC…"></textarea>
    <button type="submit">Ask</button>
  </form>
  <div class="oc-disclaimer">Overview prototype · Answers use data displayed on this page.</div>
</aside>
<style>
#bbdc-ask-orion{position:fixed;right:24px;top:68px;z-index:45;border:0;border-radius:999px;padding:7px 13px;background:#78a7ef;color:#fff;font:500 12px Poppins,sans-serif;box-shadow:0 5px 16px rgba(0,43,81,.14);cursor:pointer}#bbdc-ask-orion:hover{background:#5790e8}
#bbdc-orion-scrim{position:fixed;inset:0;z-index:48;background:rgba(15,23,42,.18);opacity:0;pointer-events:none;transition:opacity .25s}
#bbdc-orion-panel{position:fixed;z-index:49;right:0;top:0;width:min(430px,100vw);height:100vh;background:#fff;border-left:1px solid #dbe5ec;box-shadow:-18px 0 50px rgba(0,43,81,.15);display:flex;flex-direction:column;transform:translateX(105%);transition:transform .28s ease;font-family:Poppins,sans-serif;color:#172033}
#bbdc-orion-panel.open{transform:translateX(0)}#bbdc-orion-scrim.open{opacity:1;pointer-events:auto}.oc-head{display:flex;justify-content:space-between;gap:12px;padding:19px 20px 15px;border-bottom:1px solid #e5edf3}.oc-eyebrow{font-size:9px;font-weight:700;letter-spacing:.13em;color:#64748b}.oc-title{font-size:20px;font-weight:700;margin-top:3px}.oc-context{font-size:11px;color:#64748b}.oc-head button{border:0;background:#f1f5f9;width:30px;height:30px;border-radius:50%;font-size:21px;color:#52657d;cursor:pointer}.oc-scope{padding:10px 20px;border-bottom:1px solid #e5edf3;background:#f8fbfd;color:#36536e;font-size:10px;font-weight:600}.oc-scope span{display:inline-block;width:7px;height:7px;margin-right:7px;border-radius:50%;background:#3eb661}.oc-messages{flex:1;overflow:auto;padding:18px 18px 8px;background:#f4f7fa}.oc-row{display:flex;margin-bottom:12px}.oc-row.user{justify-content:flex-end}.oc-bubble{max-width:88%;padding:11px 13px;border-radius:14px;font-size:11px;line-height:1.6;white-space:pre-wrap;overflow-wrap:anywhere}.oc-row.orion .oc-bubble{background:#fff;border:1px solid #dbe5ec;border-bottom-left-radius:5px;color:#34445a}.oc-row.user .oc-bubble{background:#187aba;color:#fff;border-bottom-right-radius:5px}.oc-source{display:block;margin-top:8px;padding-top:7px;border-top:1px solid #e8eef3;color:#187aba;font-size:9px}.oc-prompts{display:flex;gap:6px;overflow:auto;padding:8px 18px 12px;background:#f4f7fa}.oc-prompts button{flex:0 0 auto;border:1px solid #cfe0ec;border-radius:999px;background:#fff;color:#36536e;padding:6px 9px;font:500 9px Poppins,sans-serif;cursor:pointer}.oc-form{display:flex;align-items:flex-end;gap:8px;padding:13px 16px 8px;border-top:1px solid #e5edf3;background:#fff}.oc-form textarea{flex:1;resize:none;max-height:110px;border:1px solid #d7e2ea;border-radius:13px;padding:10px 11px;outline:none;font:400 11px Poppins,sans-serif;color:#172033}.oc-form textarea:focus{border-color:#187aba;box-shadow:0 0 0 3px rgba(24,122,186,.09)}.oc-form button{border:0;border-radius:11px;background:#063b66;color:#fff;padding:10px 14px;font:600 11px Poppins,sans-serif;cursor:pointer}.oc-disclaimer{text-align:center;padding:2px 16px 11px;background:#fff;color:#94a3b8;font-size:8px}@media(max-width:767px){#bbdc-ask-orion{right:14px;top:14px}}
</style>
<script>
(()=>{const btn=document.getElementById('bbdc-ask-orion'),panel=document.getElementById('bbdc-orion-panel'),close=document.getElementById('bbdc-orion-close'),scrim=document.getElementById('bbdc-orion-scrim'),messages=document.getElementById('bbdc-orion-messages'),form=document.getElementById('bbdc-orion-form'),input=document.getElementById('bbdc-orion-input'),prompts=document.getElementById('bbdc-orion-prompts');const page=(document.querySelector('h1')?.textContent||document.title||'BBDC').trim();document.getElementById('bbdc-orion-context').textContent=page;document.getElementById('bbdc-orion-scope').textContent='Focused on '+page;
const open=()=>{panel.classList.add('open');scrim.classList.add('open');panel.setAttribute('aria-hidden','false');setTimeout(()=>input.focus(),280);if(!messages.dataset.ready){say('orion',`I’m focused on ${page}. Ask me about the information displayed on this page.`);messages.dataset.ready='1'}};const shut=()=>{panel.classList.remove('open');scrim.classList.remove('open');panel.setAttribute('aria-hidden','true')};btn.onclick=open;close.onclick=shut;scrim.onclick=shut;document.addEventListener('keydown',e=>{if(e.key==='Escape')shut()});
function text(id){return document.getElementById(id)?.textContent.trim()||'not available'}function say(role,copy,source=''){const row=document.createElement('div');row.className='oc-row '+role;const bubble=document.createElement('div');bubble.className='oc-bubble';bubble.textContent=copy;if(source){const s=document.createElement('span');s.className='oc-source';s.textContent='Source: '+source;bubble.appendChild(s)}row.appendChild(bubble);messages.appendChild(row);messages.scrollTop=messages.scrollHeight}
function visibleMetrics(){return [...document.querySelectorAll('.kpi')].map(el=>{const label=el.querySelector('.kpi-label')?.textContent.trim();const value=el.querySelector('.kpi-value')?.textContent.trim();return label&&value&&value!=='—'?`${label}: ${value}`:null}).filter(Boolean)}
function answer(q){const x=q.toLowerCase(),fv=text('fv'),cost=text('cost'),loss=text('unrealized'),companies=text('companies'),instruments=text('instruments'),coupon=text('coupon'),largest=text('largest'),largestPct=text('largest-pct'),metrics=visibleMetrics();if(/fair value|portfolio value|size/.test(x)&&fv!=='not available')return `BBDC reports total portfolio fair value of ${fv}, compared with portfolio cost of ${cost}. The current unrealized gain/(loss) is ${loss}.`;if(/largest|concentration|exposure/.test(x)&&largest!=='not available')return `The largest single company exposure is ${largest}, representing ${largestPct}.`;if(/compan|instrument/.test(x)&&companies!=='not available')return `The portfolio contains ${companies} companies and ${instruments}.`;if(/coupon|yield|income/.test(x)&&coupon!=='not available')return `The weighted average cash coupon on debt is ${coupon}.`;if(metrics.length&&/summar|overview|key metric|focus|this page/.test(x))return `${page} currently highlights: ${metrics.slice(0,6).join('; ')}.`;return `This prototype recognizes the ${page} context and can read its displayed headline metrics. The next layer will search the complete BBDC data and source-document library, reason across pages, and return document-level citations.`}
function ask(q){if(!q.trim())return;say('user',q.trim());input.value='';setTimeout(()=>say('orion',answer(q),page+' · displayed page data'),180)}form.onsubmit=e=>{e.preventDefault();ask(input.value)};prompts.onclick=e=>{if(e.target.tagName==='BUTTON')ask(e.target.textContent)};
})();
</script>
