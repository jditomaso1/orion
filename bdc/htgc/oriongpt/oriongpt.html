<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Orion — Command Center</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family:'Poppins',sans-serif;
  background:#f4f7fa;
  margin:0;
}

.shell {
  display:grid;
  grid-template-columns:256px 1fr;
  height:100vh;
}

#sidebar-placeholder {
  background:#fff;
  border-right:1px solid #e5e7eb;
  overflow:auto;
}

.canvas {
  display:grid;
  grid-template-rows:auto auto 1fr auto;
  height:100vh;
}

.header {
  padding:16px 20px;
  border-bottom:1px solid #e5e7eb;
  background:#fff;
  display:flex;
  justify-content:space-between;
}

.pill {
  padding:6px 10px;
  border:1px solid #e5e7eb;
  border-radius:999px;
  font-size:11px;
  cursor:pointer;
  background:#fff;
}

.pill:hover {
  background:#187ABA;
  color:#fff;
}

.chat {
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.bubble {
  max-width:70%;
  padding:10px 14px;
  border-radius:14px;
  font-size:13px;
}

.user {
  align-self:flex-end;
  background:#187ABA;
  color:#fff;
}

.assistant {
  align-self:flex-start;
  background:#fff;
  border:1px solid #e5e7eb;
}

.input-area {
  padding:16px 18px;
  border-top:1px solid #e5e7eb;
  background:#fff;
  display:flex;
  gap:10px;
}

textarea {
  flex:1;
  resize:none;
  padding:10px 12px 10px 16px;
  border:1px solid #d1d5db;
  border-radius:10px;
  background:#fafafa;
}

textarea::placeholder {
  color:#9ca3af;
}

button {
  padding:8px 14px;
  background:#002B51;
  color:#fff;
  border:none;
  border-radius:8px;
}

@media(max-width:768px){
  .shell{grid-template-columns:1fr;}
  #sidebar-placeholder{display:none;}
}
</style>
</head>

<body>

<div class="shell">

<!-- SIDEBAR -->
<div id="sidebar-placeholder"></div>

<!-- MAIN -->
<main class="canvas">

<div class="header">
  <div>
    <div style="font-weight:600;">Orion — Ask the Deal Stack</div>
    <div style="font-size:11px;color:#666;">Simulated Intelligence Layer</div>
  </div>
  <div style="font-size:11px;color:#16a34a;">● Active</div>
</div>

<!-- 🔥 PRESET QUESTIONS -->
<div style="padding:12px 20px;display:flex;gap:8px;flex-wrap:wrap;">
  <button class="pill" onclick="askPreset('Give me an overview of the portfolio')">Overview</button>
  <button class="pill" onclick="askPreset('What is the yield and structure of the portfolio?')">Yield</button>
  <button class="pill" onclick="askPreset('What are the key risk exposures?')">Risk</button>
  <button class="pill" onclick="askPreset('How is the portfolio allocated by sector?')">Sector</button>
  <button class="pill" onclick="askPreset('What are the largest positions and concentrations?')">Top Positions</button>
  <button class="pill" onclick="askPreset('What stands out as interesting or differentiated?')">Insights</button>
</div>

<div id="chat" class="chat"></div>

<div class="input-area">
  <textarea id="input" rows="1" placeholder="Ask something..."></textarea>
  <button id="send">Ask</button>
</div>

</main>
</div>

<script>
/* ---------- SIDEBAR (PERSISTENT) ---------- */
(async function(){
  try {
    const res = await fetch("/bdc/htgc/sidebar.html");
    if(!res.ok) return;

    document.getElementById("sidebar-placeholder").innerHTML = await res.text();

    window.toggleSection = function(id){
      const s = document.getElementById(id);
      const i = document.getElementById("icon-"+id);
      if(!s) return;

      const hidden = s.classList.toggle("hidden");

      if(i){
        i.style.transform = hidden ? "rotate(0deg)" : "rotate(90deg)";
      }

      localStorage.setItem("sidebar-open-section", id);
    };

    const last = localStorage.getItem("sidebar-open-section");

    if(last){
      const s = document.getElementById(last);
      const i = document.getElementById("icon-"+last);

      if(s){
        s.classList.remove("hidden");
        if(i) i.style.transform = "rotate(90deg)";
      }
    }

  } catch(e){
    console.warn("Sidebar error");
  }
})();

/* ---------- CHAT ENGINE ---------- */
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const send = document.getElementById("send");

function add(role, text){
  const div = document.createElement("div");
  div.className = `bubble ${role}`;
  div.innerHTML = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

add("assistant","<b>Orion is live.</b> Select a question or ask directly.");

/* ---------- LOCAL RESPONSES ---------- */
function getLocalAnswer(q){
  const t = q.toLowerCase();

  if(t.includes("overview")){
    return `
    The portfolio consists of ~140+ positions, predominantly senior secured loans to growth-stage companies across technology, healthcare, and venture-backed sectors.

    The strategy is heavily focused on:
    • Application & System Software (~largest allocation)
    • Healthcare Services & Biotech
    • Select exposure to Consumer and Industrial innovation

    Structurally, nearly all positions are first-lien with strong covenant packages, and many include PIK components and exit fees, enhancing total return.

    This is a classic venture lending / growth credit portfolio with a strong bias toward downside protection and yield enhancement.
    `;
  }

  if(t.includes("yield")){
    return `
    The portfolio is primarily floating rate, with spreads typically ranging:

    • SOFR + ~6% to 9%
    • Prime-based structures with floors ~8%–11%
    • Frequent PIK components (1%–5%)
    • Exit fees commonly 2%–7%

    All-in yields are generally in the low-to-mid teens (≈11%–14%), depending on PIK realization and fee capture.

    The structure is designed to:
    • Protect downside via floors
    • Enhance returns via PIK + fees
    • Maintain floating rate exposure in a higher rate environment
    `;
  }

  if(t.includes("risk")){
    return `
    Key risks in the portfolio:

    1. Venture / Growth Exposure  
    Many borrowers are not fully cash-flow positive, increasing dependency on capital markets.

    2. Sector Concentration  
    Heavy exposure to software and healthcare innovation creates correlation risk.

    3. Large Position Sizes  
    Several positions exceed $50MM–$100MM (e.g., Shield AI, Marathon Health, Phathom), creating idiosyncratic exposure.

    4. PIK Utilization  
    Higher PIK levels can signal stress or deferred cash interest.

    That said, risk is mitigated by:
    • Senior secured positioning
    • Strong sponsor backing
    • Structured downside protection (floors, fees)
    `;
  }

  if(t.includes("sector")){
    return `
    The portfolio is highly concentrated in innovation-driven sectors:

    • Application / System Software → dominant allocation  
    • Healthcare Services & Biotech → major secondary exposure  
    • Consumer Platforms → smaller but meaningful  
    • Defense / Space / Energy Transition → emerging themes  

    This reflects a clear strategy:
    lending into high-growth, venture-backed ecosystems where traditional lenders are less active.

    It is not a diversified LBO-style portfolio — it is a growth credit strategy.
    `;
  }

  if(t.includes("largest") || t.includes("top")){
    return `
    The portfolio includes several large, concentrated positions:

    Notable exposures:
    • Shield AI → ~$117MM  
    • Marathon Health → ~$180MM combined  
    • Phathom Pharmaceuticals → ~$170MM combined  
    • Tipalti → ~$115MM combined  
    • Armis → ~$150MM+ combined  

    This indicates:
    • High conviction underwriting
    • Deep relationships with borrowers
    • Willingness to scale within winners

    However, it also introduces concentration risk that requires active monitoring.
    `;
  }

  if(t.includes("insight") || t.includes("interesting")){
    return `
    What stands out about this portfolio:

    1. Strong Thematic Positioning  
    Heavy exposure to AI, cybersecurity, biotech, and next-gen infrastructure.

    2. Sophisticated Structuring  
    Frequent use of:
    • PIK interest  
    • Rate floors  
    • Exit fees  
    → indicating advanced credit structuring

    3. Hybrid Credit Profile  
    Sits between:
    • Traditional private credit  
    • Venture lending  

    4. Upside Orientation  
    Many borrowers have equity-like upside characteristics, even though the structure is debt.

    This is not just yield lending — this is strategic growth credit deployment.
    `;
  }

  return "No predefined answer available.";
}

/* ---------- RUN ---------- */
async function run(){
  const q = input.value.trim();
  if(!q) return;

  add("user", q);
  input.value="";
  send.disabled = true;

  const thinking = add("assistant","Thinking...");

  setTimeout(()=>{
    thinking.innerHTML = "<b>Orion:</b> " + getLocalAnswer(q);
    send.disabled = false;
  }, 400);
}

/* ---------- PRESET CLICK ---------- */
function askPreset(q){
  input.value = q;
  run();
}

send.onclick = run;

input.addEventListener("keydown", e=>{
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    run();
  }
});
</script>

</body>
</html>
