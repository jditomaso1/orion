<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orion — Command Center</title>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6GY4CQ6ZFH"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-6GY4CQ6ZFH');
  </script>

  <!-- Fonts + Tailwind -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background:#f4f7fa;
      margin:0;
    }

    .shell {
      display:grid;
      grid-template-columns:256px 1fr;
      height:100vh;
    }

    #sidebar-placeholder {
      background:#fff;
      border-right:1px solid #e5e7eb;
      overflow:auto;
    }

    .canvas {
      display:grid;
      grid-template-rows:auto 1fr auto;
      height:100vh;
    }

    .header {
      padding:16px 20px;
      border-bottom:1px solid #e5e7eb;
      background:#fff;
      display:flex;
      justify-content:space-between;
    }

    .chat {
      padding:20px;
      overflow-y:auto;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .bubble {
      max-width:70%;
      padding:10px 14px;
      border-radius:14px;
      font-size:13px;
    }

    .user {
      align-self:flex-end;
      background:#187ABA;
      color:#fff;
    }

    .assistant {
      align-self:flex-start;
      background:#fff;
      border:1px solid #e5e7eb;
    }

    .input-area {
      padding:14px;
      border-top:1px solid #e5e7eb;
      background:#fff;
      display:flex;
      gap:10px;
    }

    textarea {
      flex:1;
      resize:none;
      padding:8px;
      border:1px solid #ccc;
      border-radius:8px;
      font-size:13px;
    }

    button {
      padding:8px 14px;
      background:#002B51;
      color:#fff;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    button:disabled {
      opacity:.4;
    }

    @media(max-width:768px){
      .shell{grid-template-columns:1fr;}
      #sidebar-placeholder{display:none;}
    }
  </style>
</head>

<body>

<div class="shell">

  <!-- SIDEBAR -->
  <div id="sidebar-placeholder"></div>

  <main class="canvas">

    <div class="header">
      <div>
        <div style="font-weight:600;">Orion — Ask the Deal Stack</div>
        <div style="font-size:11px;color:#666;">Local API connection</div>
      </div>
      <div style="font-size:11px;color:#16a34a;">● Connected</div>
    </div>

    <div id="chat" class="chat"></div>

    <div class="input-area">
      <textarea id="input" rows="1" placeholder="Ask something..."></textarea>
      <button id="send">Ask</button>
    </div>

  </main>
</div>

<script>
/* ---------- SIDEBAR (SAFE LOAD) ---------- */
(async function(){
  try {
    const res = await fetch("/bdc/htgc/sidebar.html");
    if(res.ok){
      document.getElementById("sidebar-placeholder").innerHTML = await res.text();
    }
  } catch(e){
    console.warn("Sidebar not loaded");
  }
})();

/* ---------- CHAT ---------- */
const API = "http://127.0.0.1:8000";

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const send = document.getElementById("send");

function add(role, text){
  const div = document.createElement("div");
  div.className = `bubble ${role}`;
  div.innerHTML = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

add("assistant","<b>Orion is live.</b> Ask something.");

/* ---------- SEND ---------- */
async function run(){
  const q = input.value.trim();
  if(!q) return;

  add("user", q);
  input.value="";
  send.disabled = true;

  const thinking = add("assistant","Thinking...");

  try{
    const res = await fetch(`${API}/ask-orion`,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ question:q, top_k:20 })
    });

    if(!res.ok) throw new Error("API error");

    const data = await res.json();
    thinking.innerHTML = "<b>Orion:</b> " + (data.answer || "No answer");

  } catch(e){
    thinking.innerHTML = `<span style="color:red">⚠️ ${e.message}</span>`;
  }

  send.disabled = false;
}

send.onclick = run;

input.addEventListener("keydown", e=>{
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    run();
  }
});
</script>

</body>
</html>
