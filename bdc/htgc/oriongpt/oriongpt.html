<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orion — Command Center</title>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6GY4CQ6ZFH"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-6GY4CQ6ZFH');
    gtag('set', 'app_name', 'orion');
  </script>

  <link rel="icon" type="image/png"
        href="https://raw.githubusercontent.com/jditomaso1/private-credit-marketing/main/img/favicon.png?v=2" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html.auth-pending body { visibility: hidden; }
  </style>
  <script>document.documentElement.classList.add('auth-pending');</script>
  <script src="/dnb/js/guard.js?v=20260115-1" defer></script>

  <style>
    :root {
      --blue:    #187ABA;
      --blue-80: #4695C8;
      --blue-40: #A3CAE3;
      --blue-20: #D1E4F1;
      --navy:    #002B51;
      --navy-80: #335574;
      --navy-40: #99AAB9;
      --navy-20: #CCD5DC;
      --jade:    #3EB661;
      --jade-20: #DAF2E2;
      --jade-40: #B2E2C0;
      --berry:   #D3086F;
      --bg:      #F4F7FA;
      --surface: #FFFFFF;
      --border:  #E2EAF0;
      --text:    #002B51;
      --muted:   #335574;
      --light:   #99AAB9;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: 'Poppins', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh; width: 100vw;
      overflow: hidden;
    }

    /* ── Shell ── */
    .shell {
      display: grid;
      grid-template-columns: 256px 1fr;
      height: 100vh; width: 100vw;
      overflow: hidden;
    }

    #sidebar-placeholder { height: 100vh; overflow-y: auto; }

    /* ── Canvas: header → chat stream → input ── */
    .canvas {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
    }

    /* ── Header ── */
    .header-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 22px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .page-title { font-size: 14px; font-weight: 700; color: var(--navy); }
    .page-sub   { font-size: 10px; color: var(--muted); margin-top: 1px; }

    .status-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 999px; font-size: 10px; font-weight: 600;
      background: var(--jade-20); color: #1a6b3a;
      border: 1px solid var(--jade-40);
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--jade); flex-shrink: 0;
    }

    /* ── Chat stream ── */
    .chat-stream {
      flex: 1; overflow-y: auto;
      padding: 18px 22px;
      display: flex; flex-direction: column; gap: 12px;
      min-height: 0;
    }
    .chat-stream::-webkit-scrollbar { width: 3px; }
    .chat-stream::-webkit-scrollbar-thumb { background: var(--blue-40); border-radius: 2px; }

    /* ── Bubbles ── */
    .bubble-row { display: flex; }
    .bubble-row.user    { justify-content: flex-end; }
    .bubble-row.assistant { justify-content: flex-start; }

    .bubble {
      max-width: 72%; padding: 10px 14px;
      border-radius: 16px; font-size: 12px; line-height: 1.55;
    }
    .bubble.user {
      background: var(--blue); color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bubble.assistant {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,43,81,.06);
    }
    .bubble a { color: var(--blue-80); text-decoration: underline; }
    .bubble a:hover { color: var(--navy); }

    .typing-cursor::after {
      content: "|";
      animation: blink 0.7s steps(1) infinite;
      color: var(--blue);
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Sources block ── */
    .sources-block {
      margin-top: 8px; padding-top: 8px;
      border-top: 1px solid var(--blue-20);
      font-size: 11px; color: var(--muted);
    }
    .sources-label {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--light); margin-bottom: 4px;
    }

    /* ── Input area ── */
    .input-area {
      padding: 14px 22px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-box {
      display: flex; align-items: flex-end; gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
      box-shadow: 0 1px 4px rgba(0,43,81,.05);
      transition: border-color .15s, box-shadow .15s;
    }
    .input-box:focus-within {
      border-color: var(--blue-80);
      box-shadow: 0 0 0 3px var(--blue-20);
    }
    #chatInput {
      flex: 1; background: transparent; outline: none;
      resize: none; font-size: 12px; color: var(--navy);
      font-family: 'Poppins', system-ui, sans-serif;
      max-height: 120px; padding: 4px 0;
      line-height: 1.5;
    }
    #chatInput::placeholder { color: var(--light); }

    #sendBtn {
      padding: 7px 16px; border-radius: 10px; font-size: 12px; font-weight: 600;
      background: var(--navy); color: #fff; border: none; cursor: pointer;
      transition: background .15s; white-space: nowrap; flex-shrink: 0;
    }
    #sendBtn:hover   { background: var(--blue); }
    #sendBtn:disabled { opacity: .4; cursor: default; }

    .input-hint {
      font-size: 9px; color: var(--light); margin-top: 5px; text-align: right;
    }

    @media (max-width: 767px) {
      .shell { grid-template-columns: 1fr; }
      #sidebar-placeholder { display: none; }
    }
  </style>
</head>
<body>

<div class="shell">

  <!-- SIDEBAR -->
  <div id="sidebar-placeholder"></div>
  <script>
    async function injectSidebar() {
      try {
        const res = await fetch("/bdc/htgc/sidebar.html");
        document.getElementById("sidebar-placeholder").innerHTML = await res.text();
        window.toggleSection = function(id) {
          const s=document.getElementById(id), ic=document.getElementById("icon-"+id);
          if(!s||!ic) return;
          s.classList.toggle("hidden");
          ic.style.transform=s.classList.contains("hidden")?"rotate(0deg)":"rotate(90deg)";
          localStorage.setItem("sidebar-open-section",id);
        };
        const last=localStorage.getItem("sidebar-open-section");
        if(last){const s=document.getElementById(last),ic=document.getElementById("icon-"+last);if(s&&ic){s.classList.remove("hidden");ic.style.transform="rotate(90deg)";}}
      } catch(e){}
    }
    injectSidebar();
  </script>

  <main class="canvas">

    <!-- HEADER -->
    <div class="header-row">
      <div>
        <div class="page-title">Orion — Ask the Deal Stack</div>
        <div class="page-sub">Live Pinecone + Postgres · semantic credit search</div>
      </div>
      <div class="status-badge">
        <div class="status-dot"></div>
        Connected to /ask-orion
      </div>
    </div>

    <!-- CHAT STREAM -->
    <div id="chatStream" class="chat-stream"></div>

    <!-- INPUT -->
    <div class="input-area">
      <div class="input-box">
        <textarea
          id="chatInput"
          rows="1"
          placeholder="Ask Orion a real question…"
        ></textarea>
        <button id="sendBtn">Ask</button>
      </div>
      <div class="input-hint">Enter to send · Shift+Enter for new line</div>
    </div>

  </main>
</div>

<script>
  const ORION_API_BASE = "http://127.0.0.1:8000";

  async function askOrionBackend(question, topK = 20) {
    const res = await fetch(`${ORION_API_BASE}/ask-orion`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question, top_k: topK })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  const chatStream = document.getElementById("chatStream");
  const chatInput  = document.getElementById("chatInput");
  const sendBtn    = document.getElementById("sendBtn");

  function md(text) {
    return (text || "")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
      .replace(/\n/g,"<br/>");
  }

  function addBubble(role, html, typing=false) {
    const row = document.createElement("div");
    row.className = `bubble-row ${role}`;

    const bubble = document.createElement("div");
    bubble.className = `bubble ${role}`;
    bubble.innerHTML = html;
    if (typing) bubble.classList.add("typing-cursor");

    row.appendChild(bubble);
    chatStream.appendChild(row);
    chatStream.scrollTop = chatStream.scrollHeight;

    return bubble;
  }

  function normalizeSourceName(fileName) {
    const name = fileName || "";
    if (name.includes("Dave & Buster") && name.includes("SEC Filing")) {
      return "Dave & Buster's — Credit Agreement & Amendments";
    }
    return name;
  }

  function buildSourcesHTML(matches) {
    if (!matches?.length) return "";
    const links = matches.map(m => {
      const rawName = m.metadata?.file_name || m.id;
      const pretty  = normalizeSourceName(rawName);
      const fid = m.metadata?.file_id;
      if (fid) {
        const url = `https://drive.google.com/file/d/${fid}/view`;
        return `• <a href="${url}" target="_blank" rel="noopener">${pretty}</a>`;
      }
      return `• ${pretty}`;
    }).join("<br/>");
    return `<div class="sources-block"><div class="sources-label">Sources</div>${links}</div>`;
  }

  // Init greeting
  addBubble("assistant", md("**Joe — Orion is live.** What do you want to know?"));

  async function handleSend() {
    const q = chatInput.value.trim();
    if (!q) return;

    addBubble("user", md(q));
    chatInput.value = "";
    sendBtn.disabled = true;

    const thinking = addBubble("assistant", md("_Checking Orion…_"), true);

    try {
      const data = await askOrionBackend(q, 20);
      const answer  = data.answer  || "No answer returned.";
      const matches = data.matches || [];

      thinking.classList.remove("typing-cursor");
      thinking.innerHTML = md(`**Orion:** ${answer}`) + buildSourcesHTML(matches);
    } catch(e) {
      thinking.classList.remove("typing-cursor");
      thinking.innerHTML = `<span style="color:var(--berry)">⚠️ ${md(e.message)}</span>`;
    } finally {
      sendBtn.disabled = false;
      chatStream.scrollTop = chatStream.scrollHeight;
    }
  }

  sendBtn.addEventListener("click", handleSend);
  chatInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); }
  });

  // Auto-resize textarea
  chatInput.addEventListener("input", () => {
    chatInput.style.height = "auto";
    chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + "px";
  });
</script>

</body>
</html>
