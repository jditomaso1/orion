<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orion — HTGC / BDC News Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Poppins', sans-serif; background:#f5f6f8; margin:0; }

    .shell {
      display: grid;
      grid-template-columns: 256px 1fr;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    #sidebar-placeholder {
      height: 100vh;
      overflow-y: auto;
    }

    main {
      overflow-y: auto;
      padding: 24px;
    }

    .pill{
      border:1px solid #d5d8dd;
      background:#fff;
      border-radius:999px;
      padding:8px 12px;
      font-size:13px;
      cursor:pointer;
    }

    .pill--active{
      background:#2c7cf1;
      color:#fff;
      border-color:#2c7cf1;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:16px;
    }

    .card{
      background:#fff;
      border:1px solid #eee;
      border-radius:10px;
      padding:14px;
    }

    .card-title{ font-weight:600; }
    .card-meta{ font-size:12px; color:#666; }

    .list a{
      display:flex;
      justify-content:space-between;
      border-bottom:1px solid #eee;
      padding:10px 0;
    }

    .loader{
      padding:10px;
      background:#fff;
      border-radius:10px;
    }
  </style>
</head>

<body>

<div class="shell">

  <!-- SIDEBAR -->
  <div id="sidebar-placeholder"></div>
  <script>
    async function injectSidebar() {
      try {
        const res = await fetch("/bdc/htgc/sidebar.html");
        document.getElementById("sidebar-placeholder").innerHTML = await res.text();

        window.toggleSection = function(id) {
          const s=document.getElementById(id), ic=document.getElementById("icon-"+id);
          if(!s||!ic) return;

          s.classList.toggle("hidden");
          ic.style.transform=s.classList.contains("hidden")?"rotate(0deg)":"rotate(90deg)";
          localStorage.setItem("sidebar-open-section",id);
        };

        const last=localStorage.getItem("sidebar-open-section");
        if(last){
          const s=document.getElementById(last),ic=document.getElementById("icon-"+last);
          if(s&&ic){
            s.classList.remove("hidden");
            ic.style.transform="rotate(90deg)";
          }
        }
      } catch(e){}
    }
    injectSidebar();
  </script>

  <!-- MAIN CONTENT -->
  <main>

    <h1 class="text-3xl font-semibold mb-2">
      Media Hub - Hercules Capital (HTGC)
    </h1>

    <p style="color:#555;">
      BDC / Private Credit / Venture Lending intelligence — updated hourly
    </p>

    <div id="loader" class="loader">Loading...</div>

    <!-- FILTERS -->
    <nav id="filters" style="display:flex;gap:10px;flex-wrap:wrap;margin:18px 0;">
      <button data-tag="All" class="pill pill--active">All</button>
      <button data-tag="HTGC" class="pill">HTGC</button>
      <button data-tag="BDC" class="pill">BDC</button>
      <button data-tag="Private Credit" class="pill">Private Credit</button>
      <button data-tag="Earnings" class="pill">Earnings</button>
      <button data-tag="Portfolio" class="pill">Portfolio</button>
      <button data-tag="Leverage" class="pill">Leverage</button>
      <button data-tag="SEC" class="pill">SEC</button>
    </nav>

    <h3>Top 10</h3>
    <div id="top10" class="grid"></div>

    <h3>All Stories</h3>
    <div id="feed" class="list"></div>

  </main>

</div>

<script>

const API = '/api/media-feed?query=Hercules%20Capital%20HTGC%20BDC';

let _items = [];

// ---- TAG ENGINE ----
function inferTagsFromText(text=""){
  const t = text.toLowerCase();
  const out = new Set();

  if (/(hercules|htgc)/.test(t)) out.add("HTGC");
  if (/(bdc|business development company)/.test(t)) out.add("BDC");
  if (/(private credit|venture debt|direct lending)/.test(t)) out.add("Private Credit");

  if (/(earnings|nii|net investment income|results)/.test(t)) out.add("Earnings");
  if (/(portfolio|nav|non-accrual|yield)/.test(t)) out.add("Portfolio");
  if (/(leverage|debt|liquidity)/.test(t)) out.add("Leverage");
  if (/(10-k|10-q|8-k|sec)/.test(t)) out.add("SEC");

  return Array.from(out);
}

// ---- RENDER ----
function render(items=_items){
  document.getElementById('top10').innerHTML =
    items.slice(0,10).map(i=>`
      <div class="card">
        <div class="card-title">${i.title}</div>
        <div class="card-meta">${i.source || ''}</div>
      </div>
    `).join('');

  document.getElementById('feed').innerHTML =
    items.map(i=>`
      <a href="${i.url}" target="_blank">
        <span>${i.title}</span>
        <span>${i.source || ''}</span>
      </a>
    `).join('');
}

// ---- LOAD ----
async function load(){
  const res = await fetch(API);
  const data = await res.json();

  _items = (data.items || data).map(i=>{
    return {...i, tags: inferTagsFromText(i.title || '')};
  });

  document.getElementById('loader').style.display = 'none';
  render();
}

// ---- FILTER ----
document.querySelectorAll('.pill').forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll('.pill').forEach(b=>b.classList.remove('pill--active'));
    btn.classList.add('pill--active');

    const tag = btn.dataset.tag;

    if(tag === "All"){
      render();
    } else {
      render(_items.filter(i => i.tags.includes(tag)));
    }
  }
});

load();

</script>

</body>
</html>
