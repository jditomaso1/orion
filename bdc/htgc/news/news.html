<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orion — HTGC / BDC News Dashboard</title>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6GY4CQ6ZFH"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-6GY4CQ6ZFH');
  </script>

  <link rel="icon" type="image/png"
        href="https://raw.githubusercontent.com/jditomaso1/private-credit-marketing/main/img/favicon.png?v=2" />

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background:#f5f6f8;
      margin:0;
    }

    .shell{
      display:grid;
      grid-template-columns:256px 1fr;
      min-height:100vh;
    }

    #sidebar-placeholder{
      background:#fff;
      border-right:1px solid #e5e7eb;
      overflow:auto;
    }

    main{ min-width:0; }

    .pill{
      border:1px solid #d5d8dd;
      background:#fff;
      border-radius:999px;
      padding:8px 12px;
      font-size:13px;
      cursor:pointer;
    }

    .pill--active{
      background:#2c7cf1;
      color:#fff;
      border-color:#2c7cf1;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:16px;
    }

    @media (max-width:1024px){
      .shell{grid-template-columns:1fr;}
      #sidebar-placeholder{display:none;}
    }

    @media (max-width:820px){
      .grid{grid-template-columns:1fr;}
    }

    .card{
      background:#fff;
      border:1px solid #eee;
      border-radius:10px;
      padding:14px;
      display:block;
      color:#111;
      text-decoration:none;
    }

    .card:hover{
      box-shadow:0 6px 20px rgba(0,0,0,.08);
      transform:translateY(-1px);
    }

    .card-title{font-weight:600;margin-bottom:6px;}
    .card-meta{font-size:12px;color:#666;margin-bottom:6px;}
    .card-tags{font-size:12px;color:#666;}

    .list a{
      display:flex;
      justify-content:space-between;
      padding:10px 0;
      border-bottom:1px solid #eee;
      text-decoration:none;
      color:#111;
    }

    .list .right{font-size:12px;color:#666;}

    .loader{
      padding:10px;
      background:#fff;
      border-radius:10px;
      margin:10px 0;
    }
  </style>
</head>

<body>

<div class="shell">

  <!-- SIDEBAR -->
  <div id="sidebar-placeholder"></div>

  <!-- MAIN -->
  <main class="p-8">

    <h1 class="text-3xl font-semibold mb-2">
      Media Hub - Latest Hercules Capital, Inc. (HTGC) News
    </h1>

    <p style="color:#555;">
      Credit markets / BDC / Hercules Capital / HTGC intelligence.
    </p>

    <div id="loader" class="loader">Loading...</div>

    <!-- FILTERS -->
    <nav id="filters" style="display:flex;gap:10px;flex-wrap:wrap;margin:18px 0;">
      <button data-tag="All" class="pill pill--active">All</button>
      <button data-tag="Credit Markets" class="pill">Credit Markets</button>
      <button data-tag="BDC" class="pill">BDC</button>
      <button data-tag="Hercules Capital" class="pill">Hercules Capital</button>
      <button data-tag="Hercules BDC" class="pill">Hercules BDC</button>
      <button data-tag="HTGC" class="pill">HTGC</button>
    </nav>

    <h3 style="margin:10px 0 12px;">Top 10</h3>
    <div id="top10" class="grid"></div>

    <h3 style="margin:28px 0 12px;">All Stories</h3>
    <div id="feed" class="list"></div>

  </main>
</div>

<script>
/* =========================
   SIDEBAR (BULLETPROOF)
========================= */
async function loadSidebar(){
  const el = document.getElementById("sidebar-placeholder");

  try{
    const res = await fetch("/bdc/htgc/sidebar.html");

    if(!res.ok) throw new Error("Sidebar not found");

    const html = await res.text();
    el.innerHTML = html;

  } catch(err){
    console.warn("Sidebar failed — using fallback");

    // 🔥 fallback sidebar (ALWAYS WORKS)
    el.innerHTML = `
      <div style="padding:20px">
        <div style="font-weight:600;margin-bottom:20px;">Orion</div>

        <a href="/index.html" style="display:block;margin-bottom:10px;">Dashboard</a>
        <a href="/bdc/htgc/news.html" style="display:block;margin-bottom:10px;">HTGC News</a>
        <a href="/bdc/htgc/neural-map.html" style="display:block;margin-bottom:10px;">Neural Map</a>
      </div>
    `;
  }
}

loadSidebar();

/* =========================
   DATA + TAGGING
========================= */

const API = '/api/media-feed?query=Hercules%20Capital%20HTGC%20BDC';
let _items = [];

function inferTagsFromText(text=""){
  const t = text.toLowerCase();
  const out = new Set();

  if (/(credit|loan|lending|spread|private credit)/.test(t)) out.add("Credit Markets");
  if (/(bdc|business development)/.test(t)) out.add("BDC");
  if (/(hercules capital)/.test(t)) out.add("Hercules Capital");
  if (/(htgc)/.test(t)) out.add("HTGC");

  if (/(hercules).*(bdc)|(bdc).*(hercules)/.test(t)){
    out.add("Hercules BDC");
  }

  return Array.from(out);
}

/* =========================
   RENDER
========================= */

function render(items=_items){
  const top = document.getElementById('top10');
  const feed = document.getElementById('feed');

  top.innerHTML = items.slice(0,10).map(i=>`
    <a class="card" href="${i.url || '#'}" target="_blank">
      <div class="card-title">${i.title || ''}</div>
      <div class="card-meta">${i.source || ''}</div>
      <div class="card-tags">${(i.tags||[]).join(' · ')}</div>
    </a>
  `).join('');

  feed.innerHTML = items.map(i=>`
    <a href="${i.url || '#'}" target="_blank">
      <span>${i.title || ''}</span>
      <span class="right">${i.source || ''}</span>
    </a>
  `).join('');
}

/* =========================
   LOAD
========================= */

async function load(){
  try{
    const res = await fetch(API);
    const data = await res.json();

    _items = (data.items || data).map(i=>{
      const text = `${i.title||''} ${i.summary||''}`;
      return {...i, tags: inferTagsFromText(text)};
    });

    document.getElementById('loader').style.display='none';
    render();

  } catch(e){
    document.getElementById('loader').innerText='Error loading data';
  }
}

/* =========================
   FILTERS
========================= */

document.querySelectorAll('#filters .pill').forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll('.pill').forEach(b=>b.classList.remove('pill--active'));
    btn.classList.add('pill--active');

    const tag = btn.dataset.tag;

    if(tag==="All"){
      render();
    } else {
      render(_items.filter(i => (i.tags||[]).includes(tag)));
    }
  };
});

load();
</script>

</body>
</html>
