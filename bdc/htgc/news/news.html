<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Orion • BDC • HTGC • News</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
/* ===== DESIGN SYSTEM (FROM OVERVIEW) ===== */
:root {
  --blue:#187ABA;
  --navy:#002B51;
  --bg:#F4F7FA;
  --surface:#FFFFFF;
  --border:#E2EAF0;
  --text:#002B51;
  --muted:#335574;
  --light:#99AAB9;
}

/* ===== BASE ===== */
body {
  font-family:Poppins, sans-serif;
  background:var(--bg);
  color:var(--text);
  margin:0;
}

.shell {
  display:grid;
  grid-template-columns:256px 1fr;
  min-height:100vh;
}

#sidebar-placeholder {
  border-right:1px solid var(--border);
}

/* ===== CANVAS ===== */
.canvas {
  display:flex;
  flex-direction:column;
  padding:20px 24px;
  gap:16px;
}

/* ===== HEADER ===== */
.header-row {
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--border);
  padding-bottom:10px;
}

.page-title {
  font-size:18px;
  font-weight:700;
  color:var(--navy);
}

.page-sub {
  font-size:11px;
  color:var(--muted);
}

/* ===== PILLS ===== */
.pill {
  padding:5px 10px;
  border:1px solid var(--border);
  border-radius:999px;
  font-size:11px;
  cursor:pointer;
  background:#fff;
}

.pill--active {
  background:var(--blue);
  color:#fff;
  border-color:var(--blue);
}

/* ===== CARDS ===== */
.card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px;
  box-shadow:0 1px 6px rgba(0,43,81,.05);
  transition:.15s;
}

.card:hover {
  transform:translateY(-2px);
  box-shadow:0 6px 18px rgba(0,43,81,.08);
}

.card-title {
  font-size:13px;
  font-weight:600;
  color:var(--navy);
}

.card-meta {
  font-size:11px;
  color:var(--muted);
  margin-top:4px;
}

.card-tags {
  font-size:10px;
  color:var(--light);
  margin-top:6px;
}

/* ===== GRID ===== */
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

/* ===== LIST ===== */
.list a {
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid var(--border);
  font-size:12px;
}

.list a:hover {
  background:rgba(24,122,186,.05);
}

.loader {
  font-size:12px;
  color:var(--muted);
}

/* ===== MOBILE ===== */
@media(max-width:768px){
  .shell{grid-template-columns:1fr;}
  #sidebar-placeholder{display:none;}
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="shell">

<!-- SIDEBAR -->
<div id="sidebar-placeholder"></div>

<script>
(async function(){
  const res = await fetch("/bdc/htgc/sidebar.html");
  if(!res.ok) return;

  document.getElementById("sidebar-placeholder").innerHTML = await res.text();

  // ---- TOGGLE + SAVE STATE ----
  window.toggleSection = function(id){
    const s = document.getElementById(id);
    const i = document.getElementById("icon-"+id);
    if(!s) return;

    const isHidden = s.classList.toggle("hidden");

    if(i){
      i.style.transform = isHidden
        ? "rotate(0deg)"
        : "rotate(90deg)";
    }

    // 🔥 THIS FIXES YOUR ISSUE
    localStorage.setItem("sidebar-open-section", id);
  };

  // ---- RESTORE OPEN SECTION ----
  const last = localStorage.getItem("sidebar-open-section");

  if(last){
    const s = document.getElementById(last);
    const i = document.getElementById("icon-"+last);

    if(s){
      s.classList.remove("hidden");
      if(i) i.style.transform = "rotate(90deg)";
    }
  }

})();
</script>

<!-- MAIN -->
<main class="canvas">

<!-- HEADER -->
<div class="header-row">
  <div>
    <div class="page-title">BDC News — HTGC</div>
    <div class="page-sub">Live feed · Credit markets · Hercules Capital · BDC signals</div>
  </div>

  <div style="display:flex;gap:8px;">
    <span class="pill">Live Feed</span>
    <span class="pill">HTGC</span>
  </div>
</div>

<div id="loader" class="loader">Loading news…</div>

<!-- FILTERS -->
<nav id="filters" style="display:flex;gap:8px;flex-wrap:wrap;">
  <button data-tag="All" class="pill pill--active">All</button>
  <button data-tag="Credit Markets" class="pill">Credit</button>
  <button data-tag="BDC" class="pill">BDC</button>
  <button data-tag="Hercules Capital" class="pill">Hercules</button>
  <button data-tag="HTGC" class="pill">HTGC</button>
</nav>

<!-- TOP -->
<div>
  <div style="font-size:12px;font-weight:700;margin-bottom:6px;">Top Stories</div>
  <div id="top10" class="grid"></div>
</div>

<!-- ALL -->
<div>
  <div style="font-size:12px;font-weight:700;margin-bottom:6px;">All Headlines</div>
  <div id="feed" class="list"></div>
</div>

</main>
</div>

<script>
const API = '/api/media-feed?query=Hercules%20Capital%20HTGC%20BDC';

let _items = [];

function inferTags(text=""){
  const t=text.toLowerCase();
  const out=new Set();

  if(/credit|loan|spread/.test(t)) out.add("Credit Markets");
  if(/bdc/.test(t)) out.add("BDC");
  if(/hercules/.test(t)) out.add("Hercules Capital");
  if(/htgc/.test(t)) out.add("HTGC");

  return Array.from(out);
}

function render(items=_items){
  const top=document.getElementById('top10');
  const feed=document.getElementById('feed');

  top.innerHTML=items.slice(0,10).map(i=>`
    <a class="card" href="${i.url}" target="_blank">
      <div class="card-title">${i.title}</div>
      <div class="card-meta">${i.source||''}</div>
      <div class="card-tags">${(i.tags||[]).join(" · ")}</div>
    </a>
  `).join('');

  feed.innerHTML=items.map(i=>`
    <a href="${i.url}" target="_blank">
      <span>${i.title}</span>
      <span style="color:var(--light);font-size:11px;">${i.source||''}</span>
    </a>
  `).join('');
}

async function load(){
  try {
    const res = await fetch(API);
    const data = await res.json();

    _items = (data.items || data || [])
      .filter(i => {
        const text = ((i.title || '') + ' ' + (i.summary || '')).toLowerCase();

        return (
          text.includes('hercules capital') ||
          text.includes('htgc') ||
          text.includes('hercules') ||
        
          // 🔥 SEC SIGNALS
          text.includes('sec') ||
          text.includes('securities and exchange commission') ||
          text.includes('10-k') ||
          text.includes('10-q') ||
          text.includes('8-k') ||
          text.includes('sec filing')
        );
      })
      .map(i => {
        const text = (i.title || '') + ' ' + (i.summary || '');
        return { ...i, tags: inferTags(text) };
      });

    document.getElementById('loader').style.display = 'none';
    render();

  } catch(e){
    console.error(e);
    document.getElementById('loader').innerText = 'Error loading data';
  }
}

document.querySelectorAll('.pill').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.pill').forEach(b=>b.classList.remove('pill--active'));
    btn.classList.add('pill--active');

    const tag=btn.dataset.tag;

    if(tag==="All") render();
    else render(_items.filter(i=>(i.tags||[]).includes(tag)));
  };
});

load();
</script>

</body>
</html>
