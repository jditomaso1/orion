<script>

//
// 🔥 FORCE CLEAN QUERY (prevents backend bleed-through)
//
const API = '/api/media-feed?forceQuery=Hercules%20Capital%20HTGC%20BDC%20private%20credit%20venture%20debt';

let _items = [];

//
// 🔥 HARD FILTER — removes Dave & Buster’s + irrelevant junk
//
function isRelevant(item){
  const t = (item.title || "").toLowerCase();
  const s = (item.source || "").toLowerCase();

  // ❌ HARD EXCLUDE (your main issue)
  if (t.includes("dave & buster") || t.includes("play")) return false;

  // ❌ remove obvious non-credit noise
  if (t.includes("restaurant") || t.includes("arcade") || t.includes("gaming venue")) return false;

  // ✅ MUST MATCH CREDIT / BDC CONTEXT
  const relevant =
    /(htgc|hercules|bdc|business development company|private credit|venture debt|direct lending)/.test(t);

  return relevant;
}

//
// TAG ENGINE (BDC / CREDIT SPECIFIC)
//
function inferTagsFromText(text=""){
  const t = text.toLowerCase();
  const out = new Set();

  if (/(hercules|htgc)/.test(t)) out.add("HTGC");
  if (/(bdc|business development company)/.test(t)) out.add("BDC");
  if (/(private credit|direct lending|venture debt)/.test(t)) out.add("Private Credit");

  if (/(earnings|nii|net investment income|results|quarter)/.test(t)) out.add("Earnings");
  if (/(portfolio|nav|non-accrual|yield)/.test(t)) out.add("Portfolio");
  if (/(leverage|debt|credit facility|liquidity)/.test(t)) out.add("Leverage");
  if (/(10-k|10-q|8-k|sec)/.test(t)) out.add("SEC");

  return Array.from(out);
}

//
// RENDER
//
function render(items=_items){
  const top = document.getElementById('top10');
  const feed = document.getElementById('feed');

  top.innerHTML = items.slice(0,10).map(i=>`
    <div class="card">
      <div class="card-title">${i.title}</div>
      <div class="card-meta">${i.source || ''}</div>
    </div>
  `).join('');

  feed.innerHTML = items.map(i=>`
    <a href="${i.url}" target="_blank">
      <span>${i.title}</span>
      <span>${i.source || ''}</span>
    </a>
  `).join('');
}

//
// LOAD (with filtering)
//
async function load(){
  try {
    const res = await fetch(API, { cache: "no-store" });
    const data = await res.json();

    _items = (data.items || data)
      .filter(isRelevant) // 🔥 KEY FIX
      .map(i=>{
        return {...i, tags: inferTagsFromText(i.title || '')};
      });

    document.getElementById('loader').style.display = 'none';
    render();

  } catch (e) {
    document.getElementById('loader').innerHTML = "Error loading data";
    console.error(e);
  }
}

//
// FILTER UI
//
document.querySelectorAll('.pill').forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll('.pill').forEach(b=>b.classList.remove('pill--active'));
    btn.classList.add('pill--active');

    const tag = btn.dataset.tag;

    if(tag === "All"){
      render();
    } else {
      const filtered = _items.filter(i => i.tags.includes(tag));
      render(filtered);
    }
  }
});

//
// INIT
//
load();

</script>
