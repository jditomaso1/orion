<script>

//
// ✅ KEEP ORIGINAL API (DO NOT CHANGE — THIS WAS BREAKING YOU)
//
const API = '/api/media-feed?universe=play';

let _items = [];
const _loader = document.getElementById('loader');

//
// 🔥 SAFE FILTER (won’t kill entire feed)
//
function isRelevant(item){
  const t = (item.title || "").toLowerCase();

  // ❌ remove Dave & Buster’s specifically
  if (t.includes("dave & buster")) return false;

  // ❌ remove generic PLAY ticker noise
  if (t.includes("ticker: play") || t.includes("play earnings")) return false;

  // ❌ remove restaurant / arcade junk
  if (/(arcade|restaurant chain|eatertainment venue)/.test(t)) return false;

  // ✅ allow credit / BDC / HTGC
  if (/(htgc|hercules|bdc|business development company|private credit|venture debt|direct lending)/.test(t)) {
    return true;
  }

  // ⚠️ fallback: KEEP instead of drop (prevents blank page)
  return true;
}

//
// TAG ENGINE (unchanged logic)
//
function inferTagsFromText(text=""){
  const t = text.toLowerCase();
  const out = new Set();

  if (/(hercules|htgc)/.test(t)) out.add("HTGC");
  if (/(bdc|business development company)/.test(t)) out.add("BDC");
  if (/(private credit|direct lending|venture debt)/.test(t)) out.add("Private Credit");

  if (/(earnings|nii|net investment income|results|quarter)/.test(t)) out.add("Earnings");
  if (/(portfolio|nav|non-accrual|yield)/.test(t)) out.add("Portfolio");
  if (/(leverage|debt|credit facility|liquidity)/.test(t)) out.add("Leverage");
  if (/(10-k|10-q|8-k|sec)/.test(t)) out.add("SEC");

  return Array.from(out);
}

//
// HELPERS (minimal set to keep your page working)
//
function timeAgo(iso){
  if (!iso) return '';
  const d = new Date(iso);
  const diffMs = Date.now() - d.getTime();
  const m = Math.round(diffMs/60000);
  if (m < 60) return `${m}m`;
  const h = Math.round(m/60);
  if (h < 24) return `${h}h`;
  return `${Math.round(h/24)}d`;
}

function renderTop10(items){
  const el = document.getElementById('top10');
  el.innerHTML = (items||[]).slice(0,10).map(i=>`
    <div class="card">
      <div class="card-title">${i.title}</div>
      <div class="card-meta">${i.source || ''} · ${timeAgo(i.published_at)}</div>
    </div>
  `).join('');
}

function renderFeed(items){
  const el = document.getElementById('feed');
  el.innerHTML = (items||[]).map(i=>`
    <a href="${i.url}" target="_blank">
      <span>${i.title}</span>
      <span>${i.source || ''}</span>
    </a>
  `).join('');
}

function applyFilter(tag="All"){
  let filtered = _items;

  if(tag !== "All"){
    filtered = _items.filter(i => (i.tags || []).includes(tag));
  }

  renderTop10(filtered);
  renderFeed(filtered);
}

//
// 🔥 LOAD (SAFE VERSION — WILL NOT BREAK PAGE)
//
async function loadFeed(){
  try{
    const res = await fetch(API, { cache: 'no-store' });
    const data = await res.json();

    const rawItems = data.items || data || [];

    _items = rawItems
      .filter(isRelevant) // 🔥 FIX APPLIED HERE
      .map(i=>{
        const tags = inferTagsFromText(i.title || '');
        return {...i, tags};
      });

    if (!_items.length){
      document.getElementById('feed').innerHTML =
        '<div style="color:#6b7280">No relevant stories found.</div>';
      document.getElementById('top10').innerHTML = '';
    } else {
      applyFilter("All");
    }

    if (_loader) _loader.style.display = 'none';

  } catch(e){
    console.error(e);
    document.getElementById('feed').innerHTML =
      '<div style="color:#b91c1c">Error loading feed</div>';
  }
}

//
// FILTER UI
//
document.querySelectorAll('#filters .pill').forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll('#filters .pill').forEach(b=>b.classList.remove('pill--active'));
    btn.classList.add('pill--active');
    applyFilter(btn.dataset.tag);
  }
});

//
// INIT
//
document.addEventListener('DOMContentLoaded', loadFeed);

</script>
