<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orion — HTGC / BDC News Dashboard</title>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6GY4CQ6ZFH"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-6GY4CQ6ZFH');
  </script>

  <link rel="icon" type="image/png"
        href="https://raw.githubusercontent.com/jditomaso1/private-credit-marketing/main/img/favicon.png?v=2" />

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html.auth-pending body { visibility: hidden; }
    body { font-family: 'Poppins', sans-serif; background:#f5f6f8; margin:0; }
    * { box-sizing:border-box; }

    .shell{
      display:grid;
      grid-template-columns:256px 1fr;
      min-height:100vh;
      width:100%;
    }

    #sidebar-placeholder{
      min-height:100vh;
      overflow-y:auto;
      background:#fff;
      border-right:1px solid #e5e7eb;
    }

    main{
      min-width:0;
    }

    .pill{
      border:1px solid #d5d8dd;
      background:#fff;
      border-radius:999px;
      padding:8px 12px;
      font-size:13px;
      cursor:pointer;
      color:#222;
    }

    .pill--active{
      background:#2c7cf1;
      color:#fff;
      border-color:#2c7cf1;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:16px;
    }

    @media (max-width: 1024px){
      .shell{ grid-template-columns:1fr; }
      #sidebar-placeholder{ display:none; }
    }

    @media (max-width:820px){
      .grid{ grid-template-columns:1fr; }
    }

    .card{
      background:#fff;
      border:1px solid #eee;
      border-radius:10px;
      padding:14px;
      display:block;
      color:#111;
      text-decoration:none;
    }

    .card:hover{
      box-shadow:0 6px 20px rgba(0,0,0,.08);
      transform:translateY(-1px);
      transition:all .15s;
    }

    .card-title{
      font-weight:600;
      margin:0 0 6px 0;
      line-height:1.35;
    }

    .card-meta{
      font-size:12px;
      color:#666;
      margin:0 0 6px 0;
    }

    .card-tags{
      font-size:12px;
      color:#666;
    }

    .list a{
      display:flex;
      justify-content:space-between;
      gap:12px;
      border-bottom:1px solid #eee;
      padding:10px 0;
      color:#111;
      text-decoration:none;
    }

    .list a:hover{
      background:#fafbfc;
    }

    .list .right{
      white-space:nowrap;
      color:#666;
      font-size:12px;
    }

    .loader{
      padding:10px 12px;
      margin:6px 0 16px;
      background:#fff;
      border:1px solid #eee;
      border-radius:10px;
      color:#444;
      font-size:14px;
    }
  </style>
</head>

<body>

<div class="shell">

  <!-- SIDEBAR -->
  <div id="sidebar-placeholder"></div>
  <script>
    async function injectSidebar() {
      try {
        const res = await fetch("/bdc/htgc/sidebar.html");
        document.getElementById("sidebar-placeholder").innerHTML = await res.text();

        window.toggleSection = function (id) {
          const section = document.getElementById(id);
          const icon = document.getElementById("icon-" + id);
          if (!section || !icon) return;

          section.classList.toggle("hidden");
          icon.style.transform = section.classList.contains("hidden")
            ? "rotate(0deg)"
            : "rotate(90deg)";

          localStorage.setItem("sidebar-open-section", id);
        };

        const last = localStorage.getItem("sidebar-open-section");
        if (last) {
          const section = document.getElementById(last);
          const icon = document.getElementById("icon-" + last);
          if (section && icon) {
            section.classList.remove("hidden");
            icon.style.transform = "rotate(90deg)";
          }
        }
      } catch (e) {
        console.error("Sidebar load failed:", e);
      }
    }
    injectSidebar();
  </script>

  <!-- MAIN CONTENT -->
  <main class="p-8">

    <h1 class="text-3xl font-semibold mb-2">
      Media Hub - Latest Hercules Capital, Inc. (HTGC) News
    </h1>

    <p style="color:#555;">
      Credit markets / BDC / Hercules Capital / HTGC intelligence.
    </p>

    <div id="loader" class="loader">Loading...</div>

    <!-- FILTERS -->
    <nav id="filters" style="display:flex;gap:10px;flex-wrap:wrap;margin:18px 0;">
      <button data-tag="All" class="pill pill--active">All</button>
      <button data-tag="Credit Markets" class="pill">Credit Markets</button>
      <button data-tag="BDC" class="pill">BDC</button>
      <button data-tag="Hercules Capital" class="pill">Hercules Capital</button>
      <button data-tag="Hercules BDC" class="pill">Hercules BDC</button>
      <button data-tag="HTGC" class="pill">HTGC</button>
    </nav>

    <h3 style="margin:10px 0 12px;font-size:20px;">Top 10</h3>
    <div id="top10" class="grid"></div>

    <h3 style="margin:28px 0 12px;font-size:20px;">All Stories</h3>
    <div id="feed" class="list"></div>

  </main>
</div>

<script>
const API = '/api/media-feed?query=Hercules%20Capital%20HTGC%20BDC';

let _items = [];

function inferTagsFromText(text=""){
  const t = text.toLowerCase();
  const out = new Set();

  if (/(credit market|credit markets|loan market|loans|lending|spread|spreads|high yield|leveraged finance|private debt|private credit|direct lending|venture debt)/.test(t)) {
    out.add("Credit Markets");
  }

  if (/(bdc|business development company|business development companies)/.test(t)) {
    out.add("BDC");
  }

  if (/(hercules capital)/.test(t)) {
    out.add("Hercules Capital");
  }

  if (/(hercules capital).*(bdc|business development company)|(bdc|business development company).*(hercules capital)/.test(t)) {
    out.add("Hercules BDC");
  }

  if (/(htgc)/.test(t)) {
    out.add("HTGC");
  }

  return Array.from(out);
}

function render(items = _items){
  const top = document.getElementById('top10');
  const feed = document.getElementById('feed');

  top.innerHTML = items.slice(0,10).map(i=>`
    <a class="card" href="${i.url || '#'}" target="_blank" rel="noopener">
      <div class="card-title">${i.title || ''}</div>
      <div class="card-meta">${i.source || ''}</div>
      <div class="card-tags">${(i.tags || []).join(' · ')}</div>
    </a>
  `).join('');

  feed.innerHTML = items.map(i=>`
    <a href="${i.url || '#'}" target="_blank" rel="noopener">
      <span>${i.title || ''}</span>
      <span class="right">${i.source || ''}</span>
    </a>
  `).join('');
}

async function load(){
  try {
    const res = await fetch(API, { cache: 'no-store' });
    const data = await res.json();

    _items = (data.items || data || []).map(i => {
      const combinedText = [
        i.title || '',
        i.summary || '',
        i.description || ''
      ].join(' ');
      const tags = inferTagsFromText(combinedText);
      return { ...i, tags };
    });

    document.getElementById('loader').style.display = 'none';
    render();
  } catch (e) {
    document.getElementById('loader').textContent = 'Error loading data';
    console.error(e);
  }
}

document.querySelectorAll('#filters .pill').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('#filters .pill').forEach(b => b.classList.remove('pill--active'));
    btn.classList.add('pill--active');

    const tag = btn.dataset.tag;

    if (tag === "All") {
      render();
    } else {
      const filtered = _items.filter(i => (i.tags || []).includes(tag));
      render(filtered);
    }
  };
});

load();
</script>

</body>
</html>
